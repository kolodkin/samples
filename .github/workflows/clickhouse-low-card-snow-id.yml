name: clickhouse-low-card-snow-id

on:
  workflow_dispatch:
  push:
    paths:
      - 'clickhouse-low-card-snow-id/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clickhouse-low-card-snow-id
    env:
      CLICKHOUSE_PASSWORD: benchmark
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
          CLICKHOUSE_PASSWORD: benchmark
        options: >-
          --health-cmd "clickhouse-client --password benchmark --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run LowCardinality benchmark
        run: |
          python clickhouse_lowcardinality_benchmark.py | tee /tmp/lc_bench.txt
          echo '## LowCardinality(String) Benchmark' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/lc_bench.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run Snowflake ID benchmark
        run: |
          python clickhouse_snowflake_id_benchmark.py | tee /tmp/sf_bench.txt
          echo '## Snowflake ID Benchmark' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/sf_bench.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
