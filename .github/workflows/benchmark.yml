name: ClickHouse Benchmarks

on:
  workflow_dispatch:
  push:
    paths:
      - "post_0001/*.py"
      - ".github/workflows/benchmark.yml"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run LowCardinality benchmark
        run: |
          uv run python post_0001/clickhouse_lowcardinality_benchmark.py | tee /tmp/lc_bench.txt
          echo '## LowCardinality(String) Benchmark' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/lc_bench.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run Snowflake ID benchmark
        run: |
          uv run python post_0001/clickhouse_snowflake_id_benchmark.py | tee /tmp/sf_bench.txt
          echo '## Snowflake ID Benchmark' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/sf_bench.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
