name: ClickHouse Benchmarks

on:
  workflow_dispatch:
  push:
    paths:
      - "post_0001/*.py"
      - ".github/workflows/benchmark.yml"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install clickhouse-connect rich

      - name: Start ClickHouse
        run: bash infra/setup-ch

      - name: Run LowCardinality benchmark
        run: |
          python post_0001/clickhouse_lowcardinality_benchmark.py | tee /tmp/lc_bench.txt
          echo '## LowCardinality(String) Benchmark' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/lc_bench.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run Snowflake ID benchmark
        run: |
          python post_0001/clickhouse_snowflake_id_benchmark.py | tee /tmp/sf_bench.txt
          echo '## Snowflake ID Benchmark' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/sf_bench.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
